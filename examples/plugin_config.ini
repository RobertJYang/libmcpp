# 示例配置文件 - config.ini

# 应用程序配置
app-id=test_app
plugin-dir=./plugins
plugin=example_plugin

# 监督器配置
test_app.supervisors=main,worker

main.strategy=one_for_one
main.max_restarts=3

worker.strategy=rest_for_one
worker.max_restarts=5

# 服务配置
main.services=service1,service2
worker.services=worker_service

# 服务详细配置
service1.type=example
service1.message=Hello from service1!
service1.repeat_count=2

service2.type=example
service2.message=Hello from service2!
service2.repeat_count=3

worker_service.type=example
worker_service.message=Hello from worker service!
worker_service.repeat_count=1 