api_version: v1
kind: config

supervisors:
  - name: main
    strategy: one_for_one
    max_restarts: 3
  - name: worker
    strategy: rest_for_one
    max_restarts: 5

services:
  - name: service1
    type: example
    supervisor: main
    dependencies:
      - service2
    config:
      message: "Hello from service1!"
      repeat_count: 2

  - name: service2
    type: example
    supervisor: main
    config:
      message: "Hello from service2!"
      repeat_count: 3

  - name: worker_service
    type: example
    supervisor: worker
    config:
      message: "Hello from worker service!"
      repeat_count: 1 